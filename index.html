<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A4A">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#1B2A4A; --ink-soft:#3E4E70; --paper:#FAF8F3; --paper-line:#E4DFD2;
    --card:#FFFFFF; --gold:#C08A2E; --gold-bg:#FBF1DD; --green:#1F6F5C; --green-bg:#E3F1EC;
    --red:#B5473D; --red-bg:#FBEAE7; --muted:#8A8577;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Arial,sans-serif;background:var(--paper);color:var(--ink);}
  .app{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;margin:0 0 4px;color:var(--ink);}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;border-bottom:2px solid var(--paper-line);padding-bottom:10px;}
  .tab{padding:7px 13px;border-radius:6px;font-size:13px;cursor:pointer;background:transparent;border:1px solid transparent;color:var(--ink-soft);}
  .tab.active{background:var(--ink);color:#fff;}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:var(--card);border:1px solid var(--paper-line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stat{background:#F2EFE6;border-radius:8px;padding:12px 14px;}
  .stat .label{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .stat .value{font-size:20px;font-weight:700;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px;margin-top:8px;}
  input,select{width:100%;padding:8px 9px;border:1px solid var(--paper-line);border-radius:6px;font-size:14px;background:#fff;color:var(--ink);}
  input[type=checkbox]{width:auto;}
  button{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;cursor:pointer;margin-top:12px;}
  button.secondary{background:transparent;color:var(--red);border:1px solid var(--red);padding:5px 10px;font-size:12px;margin:0;}
  button.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--paper-line);padding:5px 10px;font-size:12px;margin:0;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--paper-line);border-radius:8px;margin-bottom:8px;background:#fff;}
  .row.paid{background:var(--green-bg);border-color:var(--green);}
  .row .info{flex:1;min-width:0;}
  .row .name{font-weight:600;font-size:14px;}
  .row .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .row .amount{font-weight:700;font-size:15px;white-space:nowrap;}
  .stamp{font-size:10px;font-weight:700;color:var(--green);border:2px solid var(--green);border-radius:4px;padding:2px 6px;transform:rotate(-6deg);display:inline-block;letter-spacing:0.5px;}
  .cat-pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--gold-bg);color:var(--gold);font-weight:600;margin-right:6px;}
  .progress-outer{background:#EDE9DC;border-radius:6px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-inner{height:100%;background:var(--green);}
  .progress-inner.over{background:var(--red);}
  .section-title{font-size:14px;font-weight:700;margin:18px 0 8px;color:var(--ink);}
  .actions{display:flex;gap:8px;align-items:center;}
  .empty{color:var(--muted);font-size:13px;padding:10px 0;}
  .alcanza-yes{color:var(--green);font-weight:700;}
  .alcanza-no{color:var(--red);font-weight:700;}
  #status-bar{position:sticky;top:0;z-index:50;text-align:center;font-size:12px;padding:5px;color:#fff;background:var(--ink-soft);display:none;}
  #status-bar.show{display:block;}
  #status-bar.error{background:var(--red);}
  #status-bar.ok{background:var(--green);}
  #lock-screen{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  #lock-box{max-width:320px;width:100%;background:#fff;border:1px solid var(--paper-line);border-radius:12px;padding:24px;text-align:center;}
  #app-content{display:none;}
  .cat-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-bg);color:var(--gold);border-radius:14px;padding:4px 10px;font-size:12px;font-weight:600;margin:0 6px 6px 0;}
  .cat-tag button{margin:0;background:transparent;color:var(--red);border:none;padding:0;font-size:14px;line-height:1;}
</style>
</head>
<body>

<div id="status-bar"></div>

<div id="lock-screen">
  <div id="lock-box">
    <h1 style="font-size:20px;">Nexo</h1>
    <p class="sub" id="lock-text">Escribe el PIN para entrar</p>
    <input id="lock-input" type="password" inputmode="numeric" placeholder="PIN">
    <button style="width:100%;" onclick="handleLock()">Entrar</button>
    <p id="lock-error" style="color:var(--red);font-size:12px;margin-top:8px;"></p>
  </div>
</div>

<div id="app-content">
<div class="app">
  <h1>Nexo</h1>
  <p class="sub">Gastos, ingresos y ahorros del mes</p>

  <div class="tabs">
    <div class="tab active" data-tab="resumen">Resumen</div>
    <div class="tab" data-tab="fijos">Gastos fijos</div>
    <div class="tab" data-tab="diarios">Gastos diarios</div>
    <div class="tab" data-tab="ingresos">Ingresos</div>
    <div class="tab" data-tab="dias">Por día</div>
    <div class="tab" data-tab="ahorros">Ahorros</div>
    <div class="tab" data-tab="tarjetas">Tarjetas</div>
    <div class="tab" data-tab="ajustes">Ajustes</div>
  </div>

  <div id="resumen" class="panel active">
    <div class="grid2">
      <div class="stat"><div class="label">Ingresos del mes</div><div class="value" id="stat-ingresos">$0</div></div>
      <div class="stat"><div class="label">Gastos del mes</div><div class="value" id="stat-gastos">$0</div></div>
    </div>
    <div class="card" style="margin-top:12px;">
      <div class="label" style="font-size:12px;color:var(--muted);">Balance</div>
      <div style="font-size:26px;font-weight:700;" id="stat-balance">$0</div>
      <div id="stat-alcanza" style="margin-top:4px;font-size:14px;"></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:600;font-size:13px;">Presupuesto de comida</span>
        <span id="food-text" style="font-size:13px;color:var(--muted);"></span>
      </div>
      <div class="progress-outer"><div class="progress-inner" id="food-bar" style="width:0%;"></div></div>
      <label>Presupuesto mensual para comida</label>
      <input type="number" id="food-budget-input" placeholder="0" step="0.01">
      <button onclick="setFoodBudget()">Guardar presupuesto</button>
    </div>
    <div class="section-title">Pendientes de pago (fijos + tarjetas)</div>
    <div id="pendientes-list"></div>
  </div>

  <div id="fijos" class="panel">
    <div class="card">
